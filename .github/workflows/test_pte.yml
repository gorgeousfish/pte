# GitHub Actions CI for pte Stata package
# Only runs Python/SymPy symbolic verification tests
# (Stata tests require a license and cannot run in CI)

name: PTE SymPy Tests

on:
  push:
    paths:
      - 'tests/sympy/**'
      - 'ado/**'
  pull_request:
    paths:
      - 'tests/sympy/**'
      - 'ado/**'

jobs:
  sympy-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install sympy numpy

      - name: Run SymPy symbolic verification tests
        run: |
          cd tests/sympy
          failed=0
          total=0
          for f in *.py; do
            total=$((total + 1))
            echo "=== Running $f ==="
            if python "$f"; then
              echo "  PASS: $f"
            else
              echo "  FAIL: $f"
              failed=$((failed + 1))
            fi
          done
          echo ""
          echo "=== Summary: $((total - failed))/$total passed ==="
          if [ $failed -gt 0 ]; then
            exit 1
          fi
